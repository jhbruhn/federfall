name: federfall_models
description: >-
  Immutable domain models for Federfall plus PocketBase RecordModel → model
  mappers. Pure Dart; no Flutter dependency.
version: 0.1.0
publish_to: none

environment:
  sdk: ^3.12.0

# Part of the Federfall pub workspace (see ../../pubspec.yaml).
resolution: workspace

dependencies:
  freezed_annotation: ^3.1.0
  pocketbase: ^0.24.0

dev_dependencies:
  build_runner: ^2.15.0
  freezed: ^3.2.6-dev.1
  test: ^1.25.0
  very_good_analysis: ^10.3.0
