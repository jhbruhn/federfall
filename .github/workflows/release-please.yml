name: Release Please

# release-please watches conventional-commit history on main and maintains a
# standing "release PR" with the next version bump + CHANGELOG. Merging that
# PR is what cuts a release: it tags vX.Y.Z, creates a GitHub Release, and
# flips `release_created` — which is what gates the docker/android jobs below.
# Nothing here runs on a normal feature-branch push; the pipeline only fires
# from commits landing on main via the version-bump PR.
on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

env:
  FLUTTER_VERSION: "3.44.3"

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # Builds amd64 and arm64 as two parallel jobs, each on a NATIVE runner for
  # its arch (this repo is public, so the arm64 runner is free) — no QEMU
  # emulation, which is what made the old single-job `platforms:
  # linux/amd64,linux/arm64` build so slow (a full Flutter web + dart2wasm
  # build under emulation is brutal). Each leg pushes by digest only; the
  # merge job below stitches both digests into one multi-arch manifest under
  # the real tags. Standard pattern, see:
  # https://docs.docker.com/build/ci/github-actions/multi-platform/#distribute-build-across-multiple-runners
  docker-build:
    name: Build image (${{ matrix.platform }})
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runs-on: ubuntu-latest
          - platform: linux/arm64
            runs-on: ubuntu-24.04-arm
    runs-on: ${{ matrix.runs-on }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Sanitize platform for artifact name
        run: echo "PLATFORM_PAIR=${PLATFORM/\//-}" >> "$GITHUB_ENV"
        env:
          PLATFORM: ${{ matrix.platform }}

      # FEDERFALL_VERSION is baked into the image env (see Dockerfile) so
      # /api/federfall/info can report it without any source file needing to
      # be touched at release time — the running image IS the source of truth.
      # No tags yet: push-by-digest, the merge job assigns the real tags.
      - id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          build-args: |
            FEDERFALL_VERSION=${{ needs.release-please.outputs.version }}
          outputs: type=image,name=ghcr.io/${{ github.repository }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=${{ matrix.platform }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - uses: actions/upload-artifact@v4
        with:
          name: digests-${{ env.PLATFORM_PAIR }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  docker-merge:
    name: Publish multi-arch manifest
    needs: [release-please, docker-build]
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # latest / vX.Y.Z / vX.Y / vX — the semver-pattern tags are derived from
      # the release-please tag rather than a `git tag` trigger event, since
      # this job is gated on release-please's output, not a tag push.
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=semver,pattern={{version}},value=${{ needs.release-please.outputs.tag_name }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.release-please.outputs.tag_name }}
            type=semver,pattern={{major}},value=${{ needs.release-please.outputs.tag_name }}

      # docker buildx imagetools create is Docker's own native CLI for
      # stitching digests into a manifest list — no dedicated Action wraps
      # this. The only glue code is turning metadata-action's newline-
      # separated `tags` output into `-t` flags.
      - name: Create manifest list and push
        working-directory: /tmp/digests
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          tag_args=()
          while IFS= read -r tag; do
            [ -n "$tag" ] && tag_args+=(-t "$tag")
          done <<< "$TAGS"
          docker buildx imagetools create "${tag_args[@]}" \
            $(printf 'ghcr.io/${{ github.repository }}@sha256:%s ' *)

      - name: Inspect pushed image
        run: |
          docker buildx imagetools inspect ghcr.io/${{ github.repository }}:${{ steps.meta.outputs.version }}

  android:
    name: Build & attach signed APK
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code (federfall_models)
        run: dart run build_runner build
        working-directory: packages/federfall_models

      - name: Generate code (app) + localizations
        run: |
          dart run build_runner build
          flutter gen-l10n
        working-directory: apps/federfall

      - name: Decode release keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > "$RUNNER_TEMP/release.jks"

      # build.gradle.kts already reads these exact env var names (see
      # apps/federfall/android/app/build.gradle.kts) — no gradle changes needed.
      #
      # Two builds: a universal (fat, all-ABI) APK for maximum compatibility, plus
      # per-ABI splits that are ~⅓ the native-lib weight. `--split-per-abi` renames
      # the outputs to app-<abi>-production-release.apk, so it can't share an
      # invocation with the universal build. We restrict the splits to the two ABIs
      # real phones ship (arm64-v8a, armeabi-v7a) — the universal APK still covers
      # the rare x86_64 case, so we don't emit a separate x86_64 split.
      #
      # Flutter offsets versionCode per ABI for `--split-per-abi` (armeabi-v7a→1xxx,
      # arm64-v8a→2xxx) so the variants stay distinct — verified: with build number
      # 777 the splits come out 1777/2777. Obtainium users should keep their APK
      # filter on ONE variant (universal / arm64-v8a / armeabi-v7a); each stream then
      # stays monotonic via the build number. Switching universal→arm64 upgrades
      # cleanly; arm64→universal reads as a downgrade and needs a reinstall.
      - name: Build signed release APKs (universal + per-ABI)
        working-directory: apps/federfall
        env:
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/release.jks
          ANDROID_KEYSTORE_ALIAS: ${{ secrets.ANDROID_KEYSTORE_ALIAS }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEYSTORE_PRIVATE_KEY_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PRIVATE_KEY_PASSWORD }}
        run: |
          common=(
            --release
            --flavor production
            --target lib/main_production.dart
            --dart-define-from-file=dart_defines/production.json
            --build-name="${{ needs.release-please.outputs.version }}"
            --build-number="${{ github.run_number }}"
          )
          flutter build apk "${common[@]}"
          flutter build apk "${common[@]}" \
            --split-per-abi \
            --target-platform android-arm64,android-arm

      - name: Remove decoded keystore
        if: always()
        run: rm -f "$RUNNER_TEMP/release.jks"

      - name: Attach APKs to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          v="${{ needs.release-please.outputs.version }}"
          out="apps/federfall/build/app/outputs/flutter-apk"
          cp "$out/app-production-release.apk"              "federfall-${v}-universal.apk"
          cp "$out/app-arm64-v8a-production-release.apk"    "federfall-${v}-arm64-v8a.apk"
          cp "$out/app-armeabi-v7a-production-release.apk"  "federfall-${v}-armeabi-v7a.apk"
          gh release upload "${{ needs.release-please.outputs.tag_name }}" \
            "federfall-${v}-universal.apk" \
            "federfall-${v}-arm64-v8a.apk" \
            "federfall-${v}-armeabi-v7a.apk"
