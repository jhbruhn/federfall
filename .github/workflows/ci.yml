name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: "3.44.3"

jobs:
  build:
    name: format · analyze · test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter ${{ env.FLUTTER_VERSION }}
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      # Resolves the whole pub workspace from the repo root.
      - name: Install dependencies
        run: flutter pub get

      - name: Generate localizations
        run: flutter gen-l10n
        working-directory: apps/federfall

      # Format the hand-written source before any generated files exist, so the
      # check never trips over generator output (l10n gen carries a format-off
      # header; *.g.dart / *.freezed.dart are produced in the next step).
      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .

      # build_runner only generates code for the package it runs in, so each
      # workspace member with its own codegen needs its own step — running it
      # in apps/federfall does not generate packages/federfall_models's
      # freezed classes, and `flutter analyze` from the repo root analyzes the
      # whole workspace.
      - name: Generate code (federfall_models)
        run: dart run build_runner build --delete-conflicting-outputs
        working-directory: packages/federfall_models

      - name: Generate code (freezed / json / riverpod)
        run: dart run build_runner build --delete-conflicting-outputs
        working-directory: apps/federfall

      - name: Analyze
        run: flutter analyze

      - name: Run tests with coverage
        run: flutter test --coverage
        working-directory: apps/federfall

      # ~80% gate. As the domain/repository packages land (Phase 2) the bar
      # stays at 80% across hand-written code; generated files are excluded.
      - name: Check coverage
        uses: VeryGoodOpenSource/very_good_coverage@v3
        with:
          path: apps/federfall/coverage/lcov.info
          min_coverage: 80
          exclude: "**/*.g.dart **/*.freezed.dart **/l10n/gen/**"

  backend-rules:
    name: backend · rule & hook tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Builds the pinned PocketBase image, runs migrations + hooks on a
      # throwaway instance, and asserts the access-rule matrix + hook behaviour.
      - name: Run PocketBase rule/hook suite
        run: backend/pocketbase/tests/run.sh

  docker-build:
    name: docker · full image builds
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      # backend-rules (above) only ever builds --target backend; the `full`
      # target's Flutter web build stage is otherwise unexercised until a
      # release actually needs it. Build-only (no push) so a break surfaces
      # on the PR, not on release day.
      - name: Build full image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: federfall:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
