# Federfall — production stack (BASE). A SINGLE container: one version-pinned
# image where PocketBase serves the REST/Realtime API, the Admin UI (/_/) AND the
# built Flutter web SPA (from /pb/pb_public, with SPA index-fallback) on ONE
# origin. There is no separate web server.
#
# TLS and gzip/caching are the OPERATOR's job: put your own reverse proxy
# (Caddy/Traefik/nginx) in front of the published host port :8090. The stack
# itself speaks plain HTTP.
#
#   Production:  docker compose -f docker-compose.yml up -d --build
#   Local dev:   docker compose up --build      # auto-merges docker-compose.override.yml
#                                               # (same full image; bind-mounts
#                                               #  migrations/hooks, automigrate on)
#
# The image is self-contained & version-pinned (migrations, hooks and the web
# bundle baked in; automigrate off). Ship changes by rebuilding + recreating.
#
# OPERATOR CONFIG lives HERE, as env vars in this file (no .env is shipped). Set
# TZ and the geocoding proxy vars below for your instance.

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      # default target = `full` (backend + web); used by both dev and prod.
      args:
        PB_VERSION: "0.39.4"
    image: federfall:0.39.4
    container_name: federfall
    restart: unless-stopped
    environment:
      TZ: "Europe/Berlin"
      # Public origin — resolves {APP_URL} in email links (e.g. the password-reset
      # link). Set this to your instance's URL; applied by pb_hooks/settings.pb.js:
      # FEDERFALL_APP_URL: "https://federfall.yourdomain.tld"
      # First app Supervisor — created on first run (and only while no active
      # supervisor exists) by pb_hooks/bootstrap_supervisor.pb.js. Set both to
      # bootstrap login without the Admin UI; unset once your supervisor exists:
      # FEDERFALL_SUPERVISOR_EMAIL: "you@yourdomain.tld"
      # FEDERFALL_SUPERVISOR_PASSWORD: "change-me-strong"
      # FEDERFALL_SUPERVISOR_NAME: "Your Name"
      # Reverse proxy — tell PocketBase which header carries the real client IP
      # (your proxy must SET/overwrite it, e.g. Caddy/nginx X-Forwarded-For).
      # Without this every request appears to come from the proxy itself and
      # per-client rate limits (the geocode budget) are shared by all users:
      # FEDERFALL_TRUSTED_PROXY_HEADERS: "X-Forwarded-For"
      # FEDERFALL_TRUSTED_PROXY_USE_LEFTMOST_IP: "false"  # "true" only for multi-proxy chains
      # Content-Security-Policy for the SPA (pb_hooks/web_headers.pb.js). Only
      # needed when you changed MAP_TILE_URL: list the tile origins the policy
      # should allow (comma-separated). FEDERFALL_CSP replaces the whole policy
      # ("off" disables it):
      # FEDERFALL_MAP_TILE_ORIGINS: "https://tile.openstreetmap.org"
      # FEDERFALL_CSP: ""
      # Geocoding proxy — see backend/pocketbase/README.md:
      # FEDERFALL_NOMINATIM_URL: "https://nominatim.example.org"
      # FEDERFALL_GEOCODER_KEY: ""
      # FEDERFALL_USER_AGENT: "Federfall/1.0 (admin@yourdomain.tld)"
      # SMTP — applied on boot by pb_hooks/settings.pb.js. SMTP stays OFF unless
      # FEDERFALL_SMTP_HOST is set (then password-reset/invite mail can be sent):
      # FEDERFALL_SMTP_HOST: "smtp.yourprovider.tld"
      # FEDERFALL_SMTP_PORT: "587"            # 465 for implicit TLS
      # FEDERFALL_SMTP_USERNAME: ""
      # FEDERFALL_SMTP_PASSWORD: ""
      # FEDERFALL_SMTP_TLS: "false"           # "true" => implicit TLS (port 465)
      # FEDERFALL_SMTP_SENDER_ADDRESS: "noreply@yourdomain.tld"
      # FEDERFALL_SMTP_SENDER_NAME: "Federfall"
      # OAuth2 logins — applied by pb_hooks/settings.pb.js. List the providers,
      # then give each one its client id + secret (a self-hosted OIDC also needs
      # the endpoint URLs). Leave unset to manage providers in the Admin UI:
      # FEDERFALL_OAUTH2_PROVIDERS: "google,oidc"
      # FEDERFALL_OAUTH2_GOOGLE_CLIENT_ID: ""
      # FEDERFALL_OAUTH2_GOOGLE_CLIENT_SECRET: ""
      # FEDERFALL_OAUTH2_OIDC_CLIENT_ID: ""
      # FEDERFALL_OAUTH2_OIDC_CLIENT_SECRET: ""
      # FEDERFALL_OAUTH2_OIDC_DISPLAY_NAME: "Single sign-on"
      # FEDERFALL_OAUTH2_OIDC_AUTH_URL: "https://id.yourdomain.tld/authorize"
      # FEDERFALL_OAUTH2_OIDC_TOKEN_URL: "https://id.yourdomain.tld/token"
      # FEDERFALL_OAUTH2_OIDC_USERINFO_URL: "https://id.yourdomain.tld/userinfo"
      # FEDERFALL_OAUTH2_OIDC_PKCE: "true"
      # Make OAuth2 the ONLY sign-in method by turning password auth off (the app
      # then hides the password form). Default is on; only set to disable:
      # FEDERFALL_PASSWORD_AUTH: "false"
      # OAuth2 self-registration (pb_hooks/oauth2_provisioning.pb.js). New users
      # default to a walled-off "guest" role; the first user (when no supervisor
      # exists yet) becomes supervisor. If your IdP sends groups, map them to
      # roles and/or gate who may register at all:
      # FEDERFALL_OIDC_GROUPS_CLAIM: "groups"          # claim holding the groups
      # FEDERFALL_OIDC_SUPERVISOR_GROUP: "federfall-admins"
      # FEDERFALL_OIDC_COORDINATOR_GROUP: "federfall-coordinators"
      # FEDERFALL_OIDC_CARER_GROUP: "federfall-carers"
      # FEDERFALL_OIDC_ALLOWED_GROUPS: ""              # if set, only these may register
    ports:
      # host:container — front this with your own TLS-terminating reverse proxy.
      - "8090:8090"
    volumes:
      - pb_data:/pb/pb_data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8090/api/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

volumes:
  pb_data:
