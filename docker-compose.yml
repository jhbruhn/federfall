# Federfall — production stack (BASE). A SINGLE container: one version-pinned
# image where PocketBase serves the REST/Realtime API, the Admin UI (/_/) AND the
# built Flutter web SPA (from /pb/pb_public, with SPA index-fallback) on ONE
# origin. There is no separate web server.
#
# TLS and gzip/caching are the OPERATOR's job: put your own reverse proxy
# (Caddy/Traefik/nginx) in front of the published host port :8090. The stack
# itself speaks plain HTTP.
#
#   Production:  docker compose -f docker-compose.yml up -d --build
#   Local dev:   docker compose up --build      # auto-merges docker-compose.override.yml
#                                               # (same full image; bind-mounts
#                                               #  migrations/hooks, automigrate on)
#
# The image is self-contained & version-pinned (migrations, hooks and the web
# bundle baked in; automigrate off). Ship changes by rebuilding + recreating.
#
# OPERATOR CONFIG lives HERE, as env vars in this file (no .env is shipped). Set
# TZ and the geocoding proxy vars below for your instance.

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      # default target = `full` (backend + web); used by both dev and prod.
      args:
        PB_VERSION: "0.39.4"
    image: federfall:0.39.4
    container_name: federfall
    restart: unless-stopped
    environment:
      TZ: "Europe/Berlin"
      # Public origin — resolves {APP_URL} in email links (e.g. the password-reset
      # link). Set this to your instance's URL; applied by pb_hooks/settings.pb.js:
      # FEDERFALL_APP_URL: "https://federfall.yourdomain.tld"
      # First app Supervisor — created on first run (and only while no active
      # supervisor exists) by pb_hooks/bootstrap_supervisor.pb.js. Set both to
      # bootstrap login without the Admin UI; unset once your supervisor exists:
      # FEDERFALL_SUPERVISOR_EMAIL: "you@yourdomain.tld"
      # FEDERFALL_SUPERVISOR_PASSWORD: "change-me-strong"
      # FEDERFALL_SUPERVISOR_NAME: "Your Name"
      # Geocoding proxy — see backend/pocketbase/README.md:
      # FEDERFALL_NOMINATIM_URL: "https://nominatim.example.org"
      # FEDERFALL_GEOCODER_KEY: ""
      # FEDERFALL_USER_AGENT: "Federfall/1.0 (admin@yourdomain.tld)"
      # SMTP — applied on boot by pb_hooks/settings.pb.js. SMTP stays OFF unless
      # FEDERFALL_SMTP_HOST is set (then password-reset/invite mail can be sent):
      # FEDERFALL_SMTP_HOST: "smtp.yourprovider.tld"
      # FEDERFALL_SMTP_PORT: "587"            # 465 for implicit TLS
      # FEDERFALL_SMTP_USERNAME: ""
      # FEDERFALL_SMTP_PASSWORD: ""
      # FEDERFALL_SMTP_TLS: "false"           # "true" => implicit TLS (port 465)
      # FEDERFALL_SMTP_SENDER_ADDRESS: "noreply@yourdomain.tld"
      # FEDERFALL_SMTP_SENDER_NAME: "Federfall"
    ports:
      # host:container — front this with your own TLS-terminating reverse proxy.
      - "8090:8090"
    volumes:
      - pb_data:/pb/pb_data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8090/api/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

volumes:
  pb_data:
