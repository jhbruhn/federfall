# Federfall — local PocketBase backend (fully containerized).
#
# Usage:
#   docker compose up --build      # build pinned image + serve on :8090
#   docker compose down            # stop (pb_data persists in ./pb_data)
#
# Config lives here as literal values (no .env files in this project).
# To change the PocketBase version: edit PB_VERSION below AND the Dockerfile ARG.

services:
  pocketbase:
    build:
      context: .
      args:
        PB_VERSION: "0.39.4"
    image: federfall-pocketbase:0.39.4
    container_name: federfall_pocketbase
    restart: unless-stopped
    ports:
      - "8090:8090"
    environment:
      TZ: "Europe/Berlin"
      # Geocoding proxy (FED-4.2). The public OSM Nominatim blocks most server
      # traffic; point this at a self-hosted instance or a permitted mirror.
      # FEDERFALL_NOMINATIM_URL: "https://nominatim.example.org"
      # FEDERFALL_GEOCODER_KEY: ""        # optional API key (keyed mirrors)
      # User-Agent sent upstream. Default "Federfall/1.0" (no address). You may
      # add a REAL contact, e.g. "Federfall/1.0 (admin@yourdomain.tld)" — note
      # Nominatim blocks placeholder domains like example.org.
      # FEDERFALL_USER_AGENT: "Federfall/1.0"
    volumes:
      # SQLite DB, uploaded files, logs — gitignored, persisted on host.
      - ./pb_data:/pb/pb_data
      # Schema migrations (.js) — committed; automigrate writes new ones here in dev.
      - ./pb_migrations:/pb/pb_migrations
      # JS hooks (pb_hooks/*.pb.js) — committed; hot-reloaded in dev.
      - ./pb_hooks:/pb/pb_hooks
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8090/api/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
