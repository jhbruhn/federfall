# Federfall — PocketBase backend (containerized), production-safe BASE stack.
#
# This base file is what a server runs. It is self-contained: migrations and
# hooks are baked into the image (see Dockerfile), so the ONLY host state is the
# pb_data volume. No source bind mounts → nothing on the host can shadow or drift
# from the committed schema.
#
#   Production:  docker compose -f docker-compose.yml up -d --build
#   Local dev:   docker compose up --build      # auto-merges docker-compose.override.yml
#
# To change the PocketBase version: edit PB_VERSION below AND the Dockerfile ARG.

services:
  pocketbase:
    build:
      context: .
      args:
        PB_VERSION: "0.39.4"
    image: federfall-pocketbase:0.39.4
    container_name: federfall_pocketbase
    restart: unless-stopped
    # Published on all interfaces. NOTE: this exposes plain HTTP on :8090 — put a
    # TLS-terminating reverse proxy (Caddy/Traefik) in front, or run PocketBase
    # with its built-in Let's Encrypt (serve --https on :443 + a real domain).
    ports:
      - "8090:8090"
    environment:
      TZ: "Europe/Berlin"
      # Geocoding proxy (FED-4.2). The public OSM Nominatim blocks most server
      # traffic; point this at a self-hosted instance or a permitted mirror.
      # FEDERFALL_NOMINATIM_URL: "https://nominatim.example.org"
      # FEDERFALL_GEOCODER_KEY: ""        # optional API key (keyed mirrors)
      # FEDERFALL_USER_AGENT: "Federfall/1.0 (admin@yourdomain.tld)"
    volumes:
      # SQLite DB, uploaded files, logs — the only persisted host state.
      - ./pb_data:/pb/pb_data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8090/api/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
