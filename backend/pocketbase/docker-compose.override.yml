# Federfall — LOCAL DEV overrides. Auto-merged by `docker compose up` on top of
# docker-compose.yml. NOT used in production (the server runs with an explicit
# `-f docker-compose.yml`, which skips this file).
#
# What dev needs that production must not have:
#   - bind-mount pb_migrations/ + pb_hooks/ so host edits take effect without a
#     rebuild (hooks hot-reload; new Admin-UI migrations land back on the host),
#   - automigrate ON so schema changes in the Admin UI are written as .js files.

services:
  pocketbase:
    volumes:
      - ./pb_migrations:/pb/pb_migrations
      - ./pb_hooks:/pb/pb_hooks
    # Re-enable automigrate for dev (base image defaults it off).
    command:
      - "serve"
      - "--http=0.0.0.0:8090"
      - "--dir=/pb/pb_data"
      - "--migrationsDir=/pb/pb_migrations"
      - "--hooksDir=/pb/pb_hooks"
      - "--automigrate=1"
