# Federfall — LOCAL DEV overrides, auto-merged by `docker compose up` on top of
# docker-compose.yml. NOT used in production (deploy runs an explicit
# `-f docker-compose.yml`, which skips this file).
#
# Dev builds the SAME full image as production (PocketBase + the baked Flutter web
# SPA), so `docker compose up` serves the whole app on http://localhost:8090. The
# override only relaxes the RUNTIME, not the image:
#   - bind-mount pb_migrations/ + pb_hooks/ so host edits take effect without a
#     rebuild (hooks hot-reload; new Admin-UI migrations land back on the host),
#   - bind-mount the existing local pb_data so dev data persists on the host,
#   - automigrate ON so Admin-UI schema changes are written as .js migration files.
#
# For UI hot-reload, run the app on the host with `flutter run` (the dev flavor
# points POCKETBASE_URL at localhost:8090) instead of using the baked SPA.

services:
  app:
    volumes:
      - ./backend/pocketbase/pb_data:/pb/pb_data
      - ./backend/pocketbase/pb_migrations:/pb/pb_migrations
      - ./backend/pocketbase/pb_hooks:/pb/pb_hooks
    command:
      - "serve"
      - "--http=0.0.0.0:8090"
      - "--dir=/pb/pb_data"
      - "--migrationsDir=/pb/pb_migrations"
      - "--hooksDir=/pb/pb_hooks"
      - "--publicDir=/pb/pb_public"
      - "--automigrate=1"
