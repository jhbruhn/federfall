<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Federfall — pigeon rehab case management">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Federfall">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Federfall</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!-- Loaded as an external file rather than via Flutter's inline-bootstrap
       template token (which the build would substitute even inside a comment,
       so it cannot be named here) — this keeps the Content-Security-Policy
       the backend sends at script-src 'self', no 'unsafe-inline'
       (backend/pocketbase/pb_hooks/web_headers.pb.js). -->
  <script src="flutter_bootstrap.js" async></script>

  <!-- Registers our own service worker (web/sw.js) — Flutter's own is a
       deprecated no-op stub, see web/register_sw.js for why this exists. -->
  <script src="register_sw.js" defer></script>
</body>
</html>
