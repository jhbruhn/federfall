# Federfall — single-origin nginx. Serves the Flutter SPA AND reverse-proxies the
# PocketBase API + Admin under the SAME domain (the web app talks to
# Uri.base.origin). This is the only public entry point; the PocketBase container
# is NOT published — nginx reaches it over the compose network as `backend`.
#
# This file is baked into the federfall-web image at /etc/nginx/conf.d/default.conf.

# Resolve `backend` via Docker's embedded DNS at request time, so a backend
# restart (new container IP) is picked up without restarting nginx.
resolver 127.0.0.11 ipv6=off valid=30s;

server {
    listen      80;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    # Clinical/finder photo uploads go through here too. Raise if needed.
    client_max_body_size 25m;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json
               image/svg+xml application/wasm application/manifest+json;

    # ── PocketBase API (incl. /api/realtime SSE) + Admin UI (/_/) ─────────────
    location ~ ^/(api|_)/ {
        set $pb_upstream backend:8090;
        proxy_pass http://$pb_upstream$request_uri;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Server-Sent Events / realtime: stream immediately and hold open.
        proxy_set_header Connection "";
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 360s;
    }

    # ── Flutter SPA. usePathUrlStrategy() → deep links fall back to index.html ─
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Never cache the entry doc or the service worker, so new deploys land at
    # once; the service worker then refreshes the versioned assets it manages.
    location = /index.html               { add_header Cache-Control "no-cache"; }
    location = /flutter_service_worker.js { add_header Cache-Control "no-cache"; }
    location = /flutter_bootstrap.js      { add_header Cache-Control "no-cache"; }

    # Static, slow-changing assets can cache.
    location ~* \.(?:wasm|woff2?|ttf|otf|png|jpe?g|gif|svg|ico)$ {
        expires    30d;
        add_header Cache-Control "public";
    }
}
