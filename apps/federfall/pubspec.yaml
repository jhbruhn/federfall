name: federfall
description: Federfall — pigeon rehab case management
version: 0.4.0
publish_to: none
environment:
  sdk: ^3.12.0
  flutter: ^3.44.0
resolution: workspace
dependencies:
  cached_network_image: ^3.4.1
  cached_network_image_platform_interface: ^4.1.1
  connectivity_plus: ^7.2.0
  csv: ^8.0.0
  federfall_data:
    path: ../../packages/federfall_data
  federfall_models:
    path: ../../packages/federfall_models
  fl_chart: ^1.2.0
  flutter:
    sdk: flutter
  flutter_cache_manager: ^3.4.1
  flutter_local_notifications: ^22.0.1
  flutter_localizations:
    sdk: flutter
  flutter_map: ^8.3.1
  flutter_riverpod: ^3.3.2
  flutter_secure_storage: ^10.3.1
  flutter_web_plugins:
    sdk: flutter
  freezed_annotation: ^3.1.0
  geolocator: ^14.0.3
  go_router: ^17.3.0
  http: ^1.3.0
  image_picker: ^1.2.3
  intl: ^0.20.2
  json_annotation: ^4.12.0
  latlong2: ^0.9.1
  package_info_plus: ^10.2.0
  pocketbase: ^0.24.0
  riverpod_annotation: ^4.0.3
  share_plus: ^13.2.0
  shared_preferences: ^2.5.5
  timezone: ^0.11.1
  url_launcher: ^6.3.0
  vector_map_tiles: ^9.0.0-beta.9
dev_dependencies:
  build_runner: ^2.15.0
  flutter_test:
    sdk: flutter
  freezed: ^3.2.6-dev.1
  json_serializable: ^6.14.0
  mocktail: ^1.0.5
  riverpod_generator: ^4.0.4
  riverpod_lint: ^3.1.4
  very_good_analysis: ^10.3.0
flutter:
  generate: true
  uses-material-design: true
  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
        - asset: assets/fonts/Roboto-Italic.ttf
          style: italic
        - asset: assets/fonts/Roboto-Medium.ttf
          weight: 500
        - asset: assets/fonts/Roboto-Bold.ttf
          weight: 700
