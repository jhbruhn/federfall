name: federfall
description: Federfall — pigeon rehab case management
version: 1.0.0+1
publish_to: none

environment:
  sdk: ^3.12.0
  flutter: ^3.44.0

# Part of the Federfall pub workspace (see ../../pubspec.yaml).
resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_map: ^8.3.0
  flutter_riverpod: ^3.3.2
  flutter_secure_storage: ^10.3.1
  freezed_annotation: ^3.1.0
  go_router: ^17.3.0
  intl: ^0.20.2
  json_annotation: ^4.12.0
  latlong2: ^0.9.1
  pocketbase: ^0.24.0
  riverpod_annotation: ^4.0.3
  shared_preferences: ^2.5.5

dev_dependencies:
  build_runner: ^2.15.0
  flutter_test:
    sdk: flutter
  freezed: ^3.2.6-dev.1
  json_serializable: ^6.14.0
  mocktail: ^1.0.5
  riverpod_generator: ^4.0.4
  riverpod_lint: ^3.1.4
  very_good_analysis: ^10.3.0

flutter:
  generate: true
  uses-material-design: true
